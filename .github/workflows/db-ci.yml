# =============================================================================
# Database CI — DACPAC 빌드 → (가드)배포 → drift/회귀 → 스모크 부하 → 실패 시 AI 요약
# -----------------------------------------------------------------------------
# azure-mi-ai-dba-demo · 데모 K (CI/CD + AI 게이트)
#
# ⚠ 실제 배포는 보류입니다. 배포/부하 job 은 DEPLOY_ENABLED 가 'true' 일 때만 동작하고,
#   기본값은 'false' 라 워크플로가 안전하게 no-op(가드) 로 통과합니다.
# 🔐 비밀/커넥션스트링 하드코딩 금지 — Azure 접속은 OIDC(azure/login) + GitHub secrets.
#
# 관련 문서: demos/cicd/K-actions-pipeline/README.md
# =============================================================================
name: db-ci

on:
  push:
    branches: [main]
    paths:
      - "demos/cicd/I-nl-migration/db-project/**"
      - "demos/cicd/I-nl-migration/migrations/**"
      - ".github/workflows/db-ci.yml"
  pull_request:
    paths:
      - "demos/cicd/I-nl-migration/db-project/**"
      - "demos/cicd/I-nl-migration/migrations/**"
  workflow_dispatch:
    inputs:
      deploy_enabled:
        description: "실제 임시 환경 배포/부하 실행 여부 (데모 기본: false)"
        type: boolean
        default: false

# 최소 권한 원칙. OIDC 토큰 발급을 위해 id-token: write 만 추가.
permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  DACPAC_PROJECT: demos/cicd/I-nl-migration/db-project/GameDb.sqlproj
  DACPAC_ARTIFACT: GameDb.dacpac
  # 데모 가드: 실제 배포/부하는 이 값이 'true' 일 때만. 기본은 비활성.
  DEPLOY_ENABLED: ${{ github.event.inputs.deploy_enabled == true && 'true' || 'false' }}

jobs:
  # ---------------------------------------------------------------------------
  # 1) 빌드: SQL Database Project → DACPAC (실 리소스 불필요)
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # global.json(db-project) 이 SDK 를 .NET 8 로 고정하므로, 러너 기본 10.x 대신
      # Microsoft.Build.Sql 이 검증한 .NET 8 SDK 로 빌드된다.
      - name: Show resolved SDK
        working-directory: demos/cicd/I-nl-migration/db-project
        run: dotnet --version

      - name: Build DACPAC (Microsoft.Build.Sql)
        working-directory: demos/cicd/I-nl-migration/db-project
        run: dotnet build GameDb.sqlproj -c Release

      - name: Locate & upload DACPAC
        run: |
          dacpac=$(find demos/cicd/I-nl-migration/db-project -name "GameDb.dacpac" | head -n1)
          echo "Found: $dacpac"
          mkdir -p out && cp "$dacpac" "out/$DACPAC_ARTIFACT"
      - uses: actions/upload-artifact@v4
        with:
          name: dacpac
          path: out/${{ env.DACPAC_ARTIFACT }}

  # ---------------------------------------------------------------------------
  # 2) 마이그레이션 정적 검사(실 리소스 불필요): 롤백 대칭성/멱등 가드 확인
  # ---------------------------------------------------------------------------
  migration-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every up has a down (rollback symmetry)
        shell: bash
        run: |
          set -euo pipefail
          dir=demos/cicd/I-nl-migration/migrations
          fail=0
          for up in "$dir"/*.up.sql; do
            down="${up%.up.sql}.down.sql"
            if [[ ! -f "$down" ]]; then echo "::error file=$up::롤백 스크립트 누락: $down"; fail=1; fi
          done
          # 파괴적 구문은 리뷰(데모 J) 대상 — 마이그레이션 폴더에서는 경고.
          if grep -RniE "DROP\s+TABLE|TRUNCATE\s+TABLE" "$dir"; then
            echo "::warning::마이그레이션에 파괴적 구문 감지 — 데이터 손실 검토 필요"
          fi
          exit $fail

  # ---------------------------------------------------------------------------
  # 3) (가드) 임시 환경 배포 — 실제 배포는 DEPLOY_ENABLED=true 일 때만
  # ---------------------------------------------------------------------------
  deploy-ephemeral:
    needs: [build, migration-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dacpac, path: out }

      - name: Guard notice
        if: env.DEPLOY_ENABLED != 'true'
        run: echo "DEPLOY_ENABLED=false → 실제 배포 건너뜀(데모 가드). 아래는 구성만 표시."

      # OIDC 로그인 — 시크릿 하드코딩 없음. (가드 시 skip)
      - name: Azure login (OIDC)
        if: env.DEPLOY_ENABLED == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # DACPAC 배포(azure/sql-action). 파괴적 변경 차단 옵션 명시.
      - name: Deploy DACPAC to ephemeral DB
        if: env.DEPLOY_ENABLED == 'true'
        uses: azure/sql-action@v2.3
        with:
          connection-string: ${{ secrets.SQL_CONNECTION_STRING }}
          path: out/${{ env.DACPAC_ARTIFACT }}
          action: publish
          arguments: >-
            /p:BlockOnPossibleDataLoss=true
            /p:DropObjectsNotInSource=false

  # ---------------------------------------------------------------------------
  # 4) 스키마 drift / 회귀 검사 (가드)
  # ---------------------------------------------------------------------------
  drift-check:
    needs: deploy-ephemeral
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard notice
        if: env.DEPLOY_ENABLED != 'true'
        run: echo "가드 - 배포된 DB가 없어 drift 검사 스킵. scripts/drift-check.sql 참고."
      - name: Run drift check (SqlPackage DeployReport + guard query)
        if: env.DEPLOY_ENABLED == 'true'
        run: |
          # DACPAC 와 실제 DB 차이를 리포트로만 산출(Publish 아님).
          sqlpackage /Action:DeployReport \
            /SourceFile:out/${{ env.DACPAC_ARTIFACT }} \
            /TargetConnectionString:"${{ secrets.SQL_CONNECTION_STRING }}" \
            /OutputPath:drift-report.xml
          # 추가 회귀 가드(핵심 인덱스/컬럼 존재 등)
          sqlcmd -C -b -i demos/cicd/K-actions-pipeline/scripts/drift-check.sql \
            -S "${{ secrets.SQLMI_SERVER }}" -d "${{ secrets.SQLMI_DATABASE }}" -G
      - uses: actions/upload-artifact@v4
        if: env.DEPLOY_ENABLED == 'true'
        with: { name: drift-report, path: drift-report.xml }

  # ---------------------------------------------------------------------------
  # 5) 부하 스모크 — 기존 game-driver 재사용 (가드, 짧게)
  # ---------------------------------------------------------------------------
  smoke-load:
    needs: drift-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard notice
        if: env.DEPLOY_ENABLED != 'true'
        run: echo "가드 - 부하 스모크 스킵. 실행 방법은 scripts/smoke-load.md 참고."
      - name: Setup Python
        if: env.DEPLOY_ENABLED == 'true'
        uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Short smoke workload (reuse game-driver)
        if: env.DEPLOY_ENABLED == 'true'
        env:
          SQLMI_SERVER: ${{ secrets.SQLMI_SERVER }}
          SQLMI_DATABASE: ${{ secrets.SQLMI_DATABASE }}
          AUTH_MODE: aad-integrated
          WORKLOAD_CONCURRENCY: "2"
          WORKLOAD_DURATION_SECONDS: "30"
        run: |
          pip install -r workload/game-driver/requirements.txt
          python workload/game-driver/driver.py

  # ---------------------------------------------------------------------------
  # 6) 실패 시 Copilot 로그 진단·요약 (AI 게이트)
  # ---------------------------------------------------------------------------
  ai-failure-summary:
    needs: [build, migration-lint, deploy-ephemeral, drift-check, smoke-load]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect failed job logs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view ${{ github.run_id }} --log-failed > failed.log || true
          echo "수집된 실패 로그 라인 수: $(wc -l < failed.log)"
      # AI 요약 훅: Copilot/Foundry 로 실패 원인 요약 → PR/Job Summary 에 게시.
      # (실제 호출은 데모 환경/키에 의존하므로 여기서는 프롬프트·산출 위치만 고정.)
      - name: Summarize failure with Copilot (hook)
        run: |
          {
            echo "## 🤖 AI 실패 진단 요약 (자리표시자)"
            echo ""
            echo "프롬프트: demos/cicd/K-actions-pipeline/scripts/summarize-failure.md 참고."
            echo "입력: failed.log (상위 원인 스택/에러 추출)."
            echo "출력: 원인 → 영향 → 다음 조치(롤백/재시도/코드수정) 3줄 요약."
          } >> "$GITHUB_STEP_SUMMARY"
